{% extends "base.html" %}
{% load static %}

{% block title %}이용약관 동의{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/components/auths/sign.css' %}">
{% endblock %}

{% block content %}
<section class="sign-page">
    <div class="sign-box">
        <h1 class="sign-title">계정 이용약관 동의</h1>

        <form class="sign-form" method="post">
            {% csrf_token %}

            <div class="terms-list">
                <div class="terms-row">
                    <label class="terms-label" for="agree_all">
                        <input
                            type="checkbox"
                            id="agree_all"
                            name="agree_all"
                            class="terms-checkbox"
                        >
                        <span class="check-icon"></span>
                        <span class="terms-text">약관 전체 동의하기</span>
                    </label>
                </div>

                <div class="terms-row">
                    <label class="terms-label" for="agree_terms">
                        <input
                            type="checkbox"
                            id="agree_terms"
                            name="agree_terms"
                            class="terms-checkbox"
                            required
                        >
                        <span class="check-icon"></span>
                        <span class="terms-text">이용약관 동의</span>
                    </label>

                    <a href="#" class="terms-link">
                        <span class="terms-link-text">약관보기</span>
                        <img
                            src="{% static 'css/images/icons/sign_click.png' %}"
                            alt=""
                            class="terms-link-icon"
                        >
                    </a>
                </div>

                <div class="terms-row">
                    <label class="terms-label" for="agree_privacy">
                        <input
                            type="checkbox"
                            id="agree_privacy"
                            name="agree_privacy"
                            class="terms-checkbox"
                            required
                        >
                        <span class="check-icon"></span>
                        <span class="terms-text">개인정보 수집 및 이용 동의</span>
                    </label>

                    <a href="#" class="terms-link">
                        <span class="terms-link-text">약관보기</span>
                        <img
                            src="{% static 'css/images/icons/sign_click.png' %}"
                            alt=""
                            class="terms-link-icon"
                        >
                    </a>
                </div>
            </div>

            <button type="submit" class="sign-next-button">
                다음
            </button>
        </form>
    </div>
</section>

<script>
    const agreeAll = document.getElementById('agree_all');
    const agreeTerms = document.getElementById('agree_terms');
    const agreePrivacy = document.getElementById('agree_privacy');

    agreeAll.addEventListener('change', function () {
        agreeTerms.checked = agreeAll.checked;
        agreePrivacy.checked = agreeAll.checked;
    });

    agreeTerms.addEventListener('change', updateAgreeAll);
    agreePrivacy.addEventListener('change', updateAgreeAll);

    function updateAgreeAll() {
        agreeAll.checked = agreeTerms.checked && agreePrivacy.checked;
    }
</script>
{% endblock %}
